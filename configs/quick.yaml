seed: 42

data:
  dataset: synthetic_motor_imagery
  num_samples: 512
  num_classes: 4
  channels: 22
  time_steps: 128
  train_ratio: 0.8

model:
  type: hybrid
  embed_dim: 64
  snn_hidden: 64
  lif_beta: 0.9
  threshold: 1.0
  transformer_layers: 1
  transformer_heads: 4
  dropout: 0.1

train:
  batch_size: 32
  epochs: 2
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  dp_enabled: false
  dp_noise_multiplier: 1.1
  dp_max_grad_norm: 1.0

device: cuda
output_dir: outputs/quick
